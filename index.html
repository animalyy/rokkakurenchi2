<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>17番の先にある部屋 実装版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --text:#f4f7fb; --sub:rgba(244,247,251,.76); --line:rgba(255,255,255,.14);
  --panel:rgba(9,12,18,.92); --panel2:rgba(255,255,255,.08); --accent:#cfe2ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0c1118;color:var(--text);font-family:'Noto Sans JP',sans-serif}
body{touch-action:manipulation}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#topbar{position:absolute;top:calc(8px + var(--safe-top));left:calc(8px + var(--safe-left));right:calc(8px + var(--safe-right));z-index:20;display:flex;justify-content:space-between;gap:8px;pointer-events:none}
.chip{pointer-events:auto;padding:10px 12px;border-radius:14px;background:rgba(9,12,18,.58);border:1px solid var(--line);backdrop-filter:blur(8px);font-size:14px;color:var(--sub)}
#sceneWrap{position:relative;flex:0 0 58%;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.08)}
#bg{position:absolute;inset:0}
#bgOverlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.06),rgba(0,0,0,.26) 60%,rgba(0,0,0,.55) 100%)}
#spotLayer{position:absolute;inset:0;z-index:2}
.spot{position:absolute;display:flex;align-items:center;justify-content:center;min-height:44px;padding:0 12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.35);border-radius:999px;color:#fff;font-size:12px}
.spot.used{opacity:.3;pointer-events:none}
.spot::after{content:'';position:absolute;inset:-6px;border:1px solid rgba(255,255,255,.12);border-radius:inherit;animation:pulse 1.8s infinite}
@keyframes pulse{0%{transform:scale(.96);opacity:.6}70%{transform:scale(1.08);opacity:0}100%{opacity:0}}
#spotHelp{position:absolute;left:14px;right:14px;bottom:14px;padding:10px 12px;border-radius:14px;background:rgba(9,12,18,.58);border:1px solid rgba(255,255,255,.08);font-size:12px;color:var(--sub);z-index:3}
#textbox{position:relative;flex:1;min-height:0;padding:16px calc(16px + var(--safe-right)) calc(92px + var(--safe-bottom)) calc(16px + var(--safe-left));background:var(--panel);display:flex;flex-direction:column;justify-content:space-between;overflow-y:auto;-webkit-overflow-scrolling:touch}
#speaker{font-size:15px;font-weight:700;color:#cfe2ff;min-height:22px;margin-bottom:8px}
#text{font-size:19px;line-height:1.78;white-space:pre-wrap;min-height:160px}
#sub{font-size:15px;color:var(--sub);min-height:22px;margin-top:10px}
#choices{display:flex;flex-direction:column;gap:8px;margin-top:10px}
button.choice,button.small,button.main{width:100%;border:none;border-radius:16px;background:var(--panel2);color:var(--text);border:1px solid var(--line);padding:15px 16px;text-align:left;font-size:17px}
button.choice:active,button.small:active,button.main:active{background:rgba(207,226,255,.16)}
#footerBtns{display:flex;gap:8px;margin-top:14px;position:sticky;bottom:calc(8px + var(--safe-bottom));padding-top:12px;background:linear-gradient(180deg,rgba(9,12,18,0),rgba(9,12,18,.92) 24%,rgba(9,12,18,.98) 100%);z-index:6}
button.small{font-size:15px;padding:12px 12px;text-align:center}
#advance{position:sticky;align-self:flex-end;right:auto;bottom:calc(68px + var(--safe-bottom));margin-top:10px;font-size:14px;color:var(--sub);z-index:6}

#heatHud{position:absolute;top:calc(52px + var(--safe-top));right:calc(10px + var(--safe-right));z-index:21;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
#heatLabel{font-size:11px;color:var(--sub);padding:4px 8px;border-radius:999px;background:rgba(9,12,18,.58);border:1px solid var(--line)}
#heatGauge{width:10px;height:108px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);overflow:hidden;display:flex;align-items:flex-end}
#heatFill{width:100%;height:40%;background:linear-gradient(180deg,rgba(194,216,255,.72),rgba(255,187,120,.85));transition:height .22s ease}
.cardchoice{padding:14px 14px 12px;border-radius:18px;background:rgba(255,255,255,.06)}
.cardchoice .cardmeta{display:block;font-size:11px;color:var(--sub);margin-top:6px}
.truthBlock{padding:10px 0;border-top:1px solid rgba(255,255,255,.08)}
.truthBlock:first-child{border-top:none}
.truthTitle{font-size:12px;color:var(--sub);margin-bottom:6px}
.truthLine{font-size:13px;line-height:1.6;padding:6px 0}
.tagRow{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0 10px}
.tag{font-size:11px;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--text)}
body.focus-room #topbar, body.focus-room #heatHud, body.focus-room #footerBtns{display:none!important}
body.focus-room #sceneWrap{flex-basis:78%}
body.focus-room #textbox{padding-top:22px}
body.focus-return #topbar, body.focus-return #heatHud, body.focus-return #footerBtns{display:none!important}
body.focus-return #sceneWrap{flex-basis:74%}
body.focus-return #textbox{padding-top:18px}
body.focus-final #topbar, body.focus-final #heatHud, body.focus-final #footerBtns, body.focus-final #advance{opacity:0!important;pointer-events:none!important}
body.focus-final #sceneWrap{flex-basis:70%}
body.focus-final #textbox{padding-top:26px}
body.focus-final #speaker{display:none}
body.focus-final #text{max-width:85%;margin:0 auto;line-height:1.8;text-align:justify;min-height:0}
body.focus-final #sub{display:none}
body.focus-final-question #topbar, body.focus-final-question #heatHud, body.focus-final-question #footerBtns, body.focus-final-question #advance{opacity:0!important;pointer-events:none!important}
body.focus-final-question #sceneWrap{flex-basis:72%}
body.focus-final-question #textbox{justify-content:center;padding-top:0}
body.focus-final-question #speaker, body.focus-final-question #sub, body.focus-final-question #choices{display:none!important}
body.focus-final-question #text{max-width:82%;margin:0 auto;min-height:0;line-height:1.95;text-align:center;transform:translateY(12vh)}
#title{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#141d2b 0%,#0c1118 100%)}
#titleCard{width:min(560px,100%);padding:26px 18px;text-align:center}
#titleCard h1{margin:0 0 10px;font-size:28px}
#titleCard p{margin:0 0 18px;color:var(--sub);line-height:1.7}
.titleActions{display:flex;flex-direction:column;gap:10px}
#modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);z-index:60;padding:16px}
#modal.show{display:flex}
#modalCard{width:min(520px,100%);background:rgba(10,14,22,.97);border:1px solid var(--line);border-radius:22px;padding:16px}
#modalTitle{font-size:15px;font-weight:700;margin-bottom:12px}
.slot{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.08)}
.slot:first-of-type{border-top:none}
.slotMeta{font-size:12px;color:var(--sub)}
.slotActions{display:flex;gap:8px}
.slotActions button{padding:8px 10px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text)}
.flag{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:4px 0;color:var(--sub)}
.truthLine.claimRejectedLine{background:#120c0c;color:#f2d7d7;text-decoration:line-through 2px #9e4444;padding:6px 8px;border-radius:8px;border:1px solid rgba(158,68,68,.45);letter-spacing:.02em}
.truthLine.claimCoreLine{background:rgba(226,186,86,.12);border:1px solid rgba(226,186,86,.28);padding:6px 8px;border-radius:8px}
.truthLine.chainLine{background:rgba(102,153,220,.10);border:1px solid rgba(102,153,220,.28);padding:6px 8px;border-radius:8px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="chip" id="sceneLabel">単一路線版</div>
    <div class="chip" id="flagLabel">VOICE 0 / TIME 0 / LOST 0 / RETURN 0</div>
  </div>
  <div id="heatHud">
    <div id="heatLabel">適</div>
    <div id="heatGauge"><div id="heatFill"></div></div>
  </div>
  <div id="sceneWrap">
    <div id="bg"></div>
    <div id="bgOverlay"></div>
    <div id="spotLayer"></div>
    <div id="spotHelp" class="hidden"></div>
  </div>
  <div id="textbox">
    <div>
      <div id="speaker"></div>
      <div id="text"></div>

      <div id="choices"></div>
    </div>
    <div id="footerBtns">
      <button class="small" id="saveBtn">セーブ</button>

<div id="title">
  <div id="titleCard">
    <h1>17番の先にある部屋</h1>
    <p>去年の文化祭のあと、この高校には返せなかった気持ちだけが居残っている。<br>17番の鍵、昼休みの放送にまぎれる一文、少しだけずれる日付。ホームルームでは何も起きていない顔をしているのに、放課後になると全部が存在しない文化祭準備室を指し始める。</p>
    <div class="titleActions">
      <button class="main" id="newGameBtn">はじめから</button>
      <button class="main" id="loadFromTitleBtn">ロード</button>
    </div>
  </div>
</div>

<div id="modal">
  <div id="modalCard">
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>

const SAVE_KEY = 'single_route_preparation_room_v22_1_final';
const BG = {
  classroom:'linear-gradient(180deg,#627d9b 0%,#4f667f 34%,#334152 34.2%,#202934 68%,#151c24 100%)',
  board:'linear-gradient(180deg,#7a8698 0%,#667384 30%,#414b58 62%,#181d24 100%)',
  corridor:'linear-gradient(180deg,#8a96a7 0%,#707b8d 26%,#46505d 58%,#171c23 100%)',
  broadcast:'linear-gradient(180deg,#6d648a 0%,#564f70 34%,#312c3f 62%,#171520 100%)',
  winter:'linear-gradient(180deg,#7b8aa5 0%,#65748f 28%,#424d60 64%,#181d27 100%)',
  shrine:'linear-gradient(180deg,#a47762 0%,#855d4f 34%,#503730 64%,#231915 100%)',
  valentine:'linear-gradient(180deg,#8f6b77 0%,#755762 30%,#493842 62%,#1b171d 100%)',
  room:'linear-gradient(180deg,#8f7b68 0%,#715f52 34%,#3f312a 68%,#171210 100%)',
  ending:'linear-gradient(180deg,#7988a2 0%,#66748c 32%,#404958 66%,#171c25 100%)'
};

const $ = s => document.querySelector(s);
const els = {
  bg: $('#bg'), sceneLabel: $('#sceneLabel'), flagLabel: $('#flagLabel'),
  speaker: $('#speaker'), text: $('#text'), sub: $('#sub'), choices: $('#choices'),
  spotLayer: $('#spotLayer'), spotHelp: $('#spotHelp'), advance: $('#advance'),
  modal: $('#modal'), modalTitle: $('#modalTitle'), modalBody: $('#modalBody'), title: $('#title'),
  heatLabel: $('#heatLabel'), heatFill: $('#heatFill')
};

  return {
    sceneId:'ch01_intro',
    idx:0,
    sceneData:{},
    flags:{
      REL_REN:0, REL_MINORI:0, REL_TORU:0, REL_NANAO:0,
      MYS_VOICE:0, MYS_TIME:0, MYS_LOST:0,
      ACT_SPEAK:0, ACT_RETURN:0, ACT_LOOK:0,
      RETURN_TARGETS:0,
      CLUE_KEY_SWAP:0, CLUE_NOTE_SYMBOL:0, CLUE_MEMO_HAND:0, CLUE_NANAO_DOOR:0, CLUE_OLD_EMA:0, CLUE_STICKER:0, CLUE_KEYBOX_PAPER:0, CLUE_RETURN_CHAIN:0
    },
    airHeat:2,
    clues:{found:[], linked:[], weak:[], history:[]},
    linkDraftFirst:null,
    linkDraftSecond:null,
    linkDraftTruth:null,
    lastLinkedTruth:null,
    lastLinkResolution:null,
    lastReturnAttempt:null,
    returnHistory:[],
    hypotheses:{},
    hypothesisEvidence:{},
    hypothesisStrength:{},
    rebuttals:{},
    hypothesisBoards:{},
    rejectedClaims:[],
    proofLog:[],
    chainState:[]
  };
}

const HYPOTHESIS_DB = {
  ch01:{label:'17番の不在の意味', correct:'protect', options:[
    {id:'mistake', text:'ただの管理ミス'},
    {id:'conceal', text:'誰かが意図的に隠している'},

  ]},
  ch02:{label:'戻ってきた落とし物の意味', correct:'stuck', options:[
    {id:'clerical', text:'ただの事務ミス'},
    {id:'stuck', text:'持ち主の事情で返りきれないものがある'},
    {id:'prank', text:'誰かの悪ふざけ'}
  ]},
  ch03:{label:'旧校舎通路の扉の意味', correct:'entrance', options:[
    {id:'storage', text:'古い倉庫の名残'},
    {id:'entrance', text:'返せなかったものへ通じる入口'},
    {id:'damage', text:'雨漏りで使えなくなっただけ'}
  ]},
  ch04:{label:'原稿にない一文の意味', correct:'leak', options:[

  ]},

  ]},
  ch06:{label:'去年の痕跡の意味', correct:'carry', options:[

  ]},
  ch07:{label:'バレンタインの未返却の意味', correct:'visible', options:[
    {id:'festival', text:'行事の気まずさが出ただけ'},
    {id:'visible', text:'未返却の感情が最も可視化された日'},
    {id:'private', text:'一人だけの問題だ'}
  ]}
};

const HYPOTHESIS_EVIDENCE_DB = {
  ch01:[
    {id:'keybox_mark', text:'17番に返却済みの印だけがあった', available:g=>seenIn('ch01_explore','keybox')},
    {id:'shelf_swap', text:'別の番号の鍵が17番の位置に戻されていた', available:g=>seenIn('ch01_explore','shelf')},
    {id:'blank_tag', text:'拾得場所だけ空白のタグが残っていた', available:g=>seenIn('ch01_explore','tag')}
  ],
  ch02:[
    {id:'wrist_text', text:'リストバンドの内側に小さな文字があった', available:g=>seenIn('ch02_explore','case')},
    {id:'symbol_line', text:'返却記録に記号だけの行があった', available:g=>seenIn('ch02_explore','note')},
    {id:'returned_again', text:'返却済みの英単語帳が一覧へ戻っていた', available:g=>seenIn('ch02_explore','list')}
  ],
  ch03:[
    {id:'foot_vanish', text:'足跡が途中で消えていた', available:g=>seenIn('ch03_explore','foot')},
    {id:'door_water', text:'扉の下だけ水がたまっていた', available:g=>seenIn('ch03_explore','door')},
    {id:'wall_removed', text:'壁の表示だけが剥がされていた', available:g=>seenIn('ch03_explore','wall')}
  ],
  ch04:[
    {id:'memo_line', text:'放送前に手書きメモを見た', available:g=>seenIn('ch04_explore','memo')},
    {id:'wrong_number', text:'付箋の教室番号が一文字違っていた', available:g=>seenIn('ch04_explore','sticky')},
    {id:'spoke_up', text:'原稿にない一文だとミノリへ伝えた', available:g=>g.state.ch04Choice==='minori'}
  ],
  ch05:[
    {id:'extra_wrap', text:'紙袋の底に宛名のない包みが残っていた', available:g=>seenIn('ch05_explore','bag')},
    {id:'ren_hand', text:'レンは何かを出しかけてやめた', available:g=>seenIn('ch05_explore','hand')},
    {id:'self_return', text:'自分から返す側に回った', available:g=>g.state.flags.ACT_RETURN>=1}
  ],
  ch06:[
    {id:'cut_ema', text:'消された絵馬の前半だけが残っていた', available:g=>seenIn('ch06_explore','ema')},
    {id:'last_year_board', text:'去年の掲示に同じ文字があった', available:g=>seenIn('ch06_explore','board')},
    {id:'asked_toru', text:'去年も来たのかとトオルに聞いた', available:g=>g.state.ch06Choice==='toru'}
  ],
  ch07:[
    {id:'nameless_box', text:'宛名のない包みを見た', available:g=>seenIn('ch07_explore','gift')},
    {id:'blackboard_trace', text:'黒板の消された文字を読んだ', available:g=>seenIn('ch07_explore','chalk')},
    {id:'follow_laugh', text:'笑ってごまかした側を追った', available:g=>g.state.ch07Choice==='voice'}
  ]
};

const HYPOTHESIS_SUPPORT = {
  ch01:{mistake:['keybox_mark'], conceal:['shelf_swap'], protect:['shelf_swap','blank_tag']},
  ch02:{clerical:['returned_again'], stuck:['symbol_line','wrist_text'], prank:['returned_again']},
  ch03:{storage:['wall_removed'], entrance:['foot_vanish','door_water'], damage:['door_water']},
  ch04:{bug:['wrong_number'], leak:['memo_line','spoke_up'], adlib:['spoke_up']},
  ch05:{random:['extra_wrap'], many:['extra_wrap','ren_hand','self_return'], romance:['extra_wrap']},
  ch06:{coincidence:['cut_ema'], carry:['last_year_board','cut_ema','asked_toru'], superstition:['last_year_board']},
  ch07:{festival:['nameless_box'], visible:['nameless_box','blackboard_trace','follow_laugh'], private:['nameless_box']}
};

const MINORI_BOARD_TEMPLATE = {
  id:'ch05_minori',
  subject:'ミノリの包み',
  phase:'open',
  activeClaimIds:['cliche_love','avoidance_of_definition','not_her_own'],
  rejectedClaimIds:[],
  confirmedClaimId:null,
  appliedKeys:[],
  claims:{
    cliche_love:{id:'cliche_love',label:'ただの恋愛感情',short:'渡せなかっただけ',confidence:45,noise:10,state:'active',supports:[],conflicts:[],notes:[]},
    avoidance_of_definition:{id:'avoidance_of_definition',label:'関係が決まることへの忌避',short:'渡すことで関係が固定するのを恐れた',confidence:25,noise:25,state:'active',supports:[],conflicts:[],notes:[]},
    not_her_own:{id:'not_her_own',label:'そもそもミノリ自身のものではない',short:'誰かの未返却を預かっているだけ',confidence:15,noise:30,state:'active',supports:[],conflicts:[],notes:[]}
  }
};

function ensureMinoriBoard(){
  if(!app.state.hypothesisBoards.ch05_minori){
    app.state.hypothesisBoards.ch05_minori = clone(MINORI_BOARD_TEMPLATE);
  }
  return app.state.hypothesisBoards.ch05_minori;
}
function minoriBoard(){ return ensureMinoriBoard(); }
function applyMinoriEffect(target,type,confidenceDelta,noiseDelta,evidenceId,note){
  const board = ensureMinoriBoard();
  const claim = board.claims[target];
  if(!claim || claim.state==='rejected' || claim.state==='confirmed') return;
  claim.confidence = Math.max(0, Math.min(100, claim.confidence + confidenceDelta));
  claim.noise = Math.max(0, Math.min(100, claim.noise + noiseDelta));
  if(type==='support' && evidenceId && !claim.supports.includes(evidenceId)) claim.supports.push(evidenceId);
  if(type==='conflict' && evidenceId && !claim.conflicts.includes(evidenceId)) claim.conflicts.push(evidenceId);
  if(note && !claim.notes.includes(note)) claim.notes.push(note);
  if(claim.confidence <= 10) claim.state='weakened';
}
function applyMinoriBoardEvidenceOnce(key){
  const board = ensureMinoriBoard();
  if(board.appliedKeys.includes(key)) return;
  board.appliedKeys.push(key);
  if(key==='ch05_bag'){
    applyMinoriEffect('cliche_love','support',10,-2,'extra_wrap','包みが残っているだけなら、よくある渡しそびれにも見える。');
    applyMinoriEffect('not_her_own','support',12,-4,'extra_wrap','宛名がないことで、ミノリ自身のものではない可能性も残る。');
  }
  if(key==='ch05_hand'){
    applyMinoriEffect('avoidance_of_definition','support',12,-5,'ren_hand','渡しかけて止まる動きが一人ではなかった。');
  }
  if(key==='ch06_toru'){
    applyMinoriEffect('cliche_love','conflict',-18,8,'asked_toru','最初から渡すつもりの持ち方には見えなかった。');
    applyMinoriEffect('avoidance_of_definition','support',14,-3,'asked_toru','渡すこと自体を決めきれていないように見えた。');
  }
  if(key==='ch06_amulet'){
    applyMinoriEffect('avoidance_of_definition','support',8,-2,'cut_ema','誰かのために選ばれたものは、渡せば関係を決めてしまう。');

function finalizeLinkReason(reasonId){

    toru:{wait_complete:-1, allow_imperfect:0, push_now:2}

  shiftHeat((deltas[target] && deltas[target][action] !== undefined) ? deltas[target][action] : 0);

    else if(action==='soft_stop' && app.state.airHeat >= 1 && app.state.airHeat <= 2) ok = true;

    if(renRejectedTruth()) reason = 'wrong_rejection';

    else if(action==='cut_hard' || app.state.airHeat >= 4) reason = 'heat_high';
    else if(app.state.airHeat <= 0) reason = 'heat_low';
  } else if(target==='toru'){
    if(toruRejectedTruth()) reason = 'wrong_rejection';
    else if(!toruKilledTrap()) reason = 'trapped_toru';
    else if(!canProveToru()) reason = 'proof';
    else if(action==='allow_imperfect' && app.state.airHeat >= 1 && app.state.airHeat <= 2) ok = true;
    else if(action==='push_now' || app.state.airHeat >= 3) reason = 'heat_high';
    else if(app.state.airHeat <= 0) reason = 'heat_low';
  }
  if(ok && strength !== 'strong'){

    if(!exact){ ok = false; reason = 'weak_truth'; }
  }
  if(target==='minori' && ok){
    app.state.proofLog.push({type:'prove', target:'minori', rejected:clone(minoriBoard().rejectedClaimIds), supports:clone(minoriBoard().claims.avoidance_of_definition.supports)});

  }

${chainSuccessText()}`;

（画面がわずかに暗くなり、曇った指跡だけが浮かぶ）
${coreFragmentText('toru')}

準備室では「言えなかった」の棚の影が薄くなり、保存のために揃っていた札の列が少し崩れる。

  if(a.reason==='proof') return `${name}の輪郭はかなり見えている。でも、まだ立証に必要な証拠が少し足りない。見えていることと、証明できることは違う。わかった気になるのと、相手へ届く言葉を持つのもまた別だ。`;
  if(a.reason==='trapped_toru' && a.target==='toru') return `トオルは、画面を伏せたまま小さく息をつく。

届かないってことにしておけば、保存してるだけで済むから。……あんたも、その言い訳をまだ残してる。

諦観という静かな罠を切れていないままでは、トオルの未送信はまだ揺るがない。`;
  if(a.reason==='heat_high') return `踏み込みすぎた。場の温度が上がりすぎて、${name}は反射的に心を閉ざす。正しいことでも、熱量を誤ると届かない。言葉が強すぎる時、高校生の教室ではそれだけで全部が恥になる。`;
  if(a.reason==='heat_low') return `熱が足りなかった。安全な言い方のままでは、${name}は保留へ戻ってしまう。もう一歩だけ温度が必要だった。やさしいだけの言葉は、ときどき都合のいい逃げ道になってしまう。`;

function addFlags(delta){ for(const k in delta){ app.state.flags[k] = (app.state.flags[k] || 0) + delta[k]; } }
function updateChips(){
  const f = app.state.flags;
  els.flagLabel.textContent = `VOICE ${f.MYS_VOICE} / TIME ${f.MYS_TIME} / LOST ${f.MYS_LOST} / LINK ${app.state.clues.linked.length} / RETURN ${f.RETURN_TARGETS}`;
  if(els.heatLabel) els.heatLabel.textContent = HEAT_LABELS[app.state.airHeat] || '適';
  if(els.heatFill) els.heatFill.style.height = (20 + app.state.airHeat * 20) + '%';
}
function currentScene(){ return app.cache; }
function enterScene(id){
  if(!id){
    showTitle();
    return;
  }
  app.state.sceneId = id;
  app.state.idx = 0;
  const base = scenes[id] || {type:'talk',label:'未定義',background:'classroom',lines:[{speaker:'',text:`未定義シーン: ${id}`}],next:'ending_fail'};
  const built = base.build ? Object.assign({}, base, base.build(app)) : clone(base);
  app.cache = built;
  app.state.noAdvanceUntil = 0;
  app.state.finalQuestionRevealed = true;
  syncFocusMode(id);
  if(/^ch08_|^ch09_|^ch10_/.test(app.state.sceneId||'')) applyRebuttals();
  if(app.cache.onEnter) app.cache.onEnter(app);
  render();
  if(id==='final_question'){
    app.state.finalQuestionRevealed = false;
    app.state.noAdvanceUntil = Number.POSITIVE_INFINITY;
    render();
    setTimeout(()=>{
      if(app.state.sceneId!=='final_question') return;
      app.state.finalQuestionRevealed = true;
      app.state.noAdvanceUntil = Date.now() + 2200;
      render();
    }, 1600);
  }
}
function nextScene(){
  const sc = currentScene();
  if(sc && sc.onExit) sc.onExit(app);
  enterScene(sc ? sc.next : null);
}
function render(){
  const sc = currentScene();
  els.sceneLabel.textContent = sc.label || '';
  els.bg.style.background = BG[sc.background] || BG.classroom;
  els.speaker.textContent=''; els.text.textContent=''; els.sub.textContent=''; els.choices.innerHTML=''; els.spotLayer.innerHTML='';
  els.spotHelp.classList.add('hidden');
  const talkish = (sc.type === 'talk' || (sc.type === 'explore' && app.state.exploreReadyNext));
  const hideForFinalQuestion = (app.state.sceneId==='final_question' && !app.state.finalQuestionRevealed);
  els.advance.classList.toggle('hidden', !(talkish) || hideForFinalQuestion);
  updateChips();
  if(sc.type==='talk') renderTalk(sc);
  if(sc.type==='choice') renderChoice(sc);
  if(sc.type==='explore') renderExplore(sc);
}
function renderTalk(sc){
  if(app.state.sceneId==='final_question' && !app.state.finalQuestionRevealed){
    els.speaker.textContent = '';
    els.text.textContent = '';
    els.sub.textContent = '';
    return;
  }
  const line = (sc.lines || [])[app.state.idx] || {speaker:'',text:''};
  els.speaker.textContent = line.speaker || '';
  els.text.textContent = line.text || '';
  els.sub.textContent = sc.sub || '';
}
function renderChoice(sc){
  els.speaker.textContent = sc.speaker || '';
  els.text.textContent = sc.text || '';
  els.sub.textContent = sc.sub || '';
  (sc.options || []).forEach(op => {
    const b = document.createElement('button');
    b.className = 'choice' + (sc.cardMode ? ' cardchoice' : '');
    if(sc.cardMode){
      b.innerHTML = `<span>${op.text}</span>${op.meta ? `<span class="cardmeta">${op.meta}</span>` : ''}`;
    } else {
      b.textContent = op.text;
    }
    b.onclick = () => {
      if(op.effects) addFlags(op.effects);
      if(op.onPick) op.onPick(app);
      const nextId = op.getNext ? op.getNext(app) : op.next;
      enterScene(nextId);
    };
    els.choices.appendChild(b);
  });
}
function renderExplore(sc){
  const slot = app.state.sceneData[app.state.sceneId] || {seen:[], lastText:'', readyNext:false};
  if(!('lastText' in slot)) slot.lastText = '';
  if(!('readyNext' in slot)) slot.readyNext = false;
  app.state.sceneData[app.state.sceneId] = slot;
  app.state.exploreReadyNext = !!slot.readyNext;

  els.speaker.textContent = sc.speaker || '';
  els.text.textContent = slot.lastText || sc.intro || '';
  els.sub.textContent = `見られるのはあと ${Math.max((sc.maxTaps || 0) - slot.seen.length, 0)} つ`;
  els.spotHelp.textContent = slot.readyNext ? 'タップで次へ進む' : (sc.help || '気になるところを見ておく');
  els.spotHelp.classList.remove('hidden');

  (sc.spots || []).forEach(spot => {
    const b = document.createElement('button');
    b.className = 'spot' + (slot.seen.includes(spot.id) ? ' used' : '');
    b.textContent = spot.label;
    b.style.left = (spot.x || 0) + '%';
    b.style.top = (spot.y || 0) + '%';
    b.style.width = (spot.w || 18) + '%';
    b.style.height = (spot.h || 8) + '%';
    b.onclick = () => {
      if(slot.seen.includes(spot.id) || slot.seen.length >= (sc.maxTaps || 0)) return;
      slot.seen.push(spot.id);
      if(spot.effects) addFlags(spot.effects);
      if(spot.clue){ app.state.flags[spot.clue] = 1; registerClue(spot.clue); }
      let t = spot.text;
      if(spot.contextText){
        Object.entries(spot.contextText).forEach(([k,v])=>{
          if(k.startsWith('after_')){
            const need = k.replace('after_','');
            if(slot.seen.includes(need)) t += '\n\n' + v;
          }
        });
      }
      if(spot.memory && spot.memory.when(app)) t += '\n\n' + spot.memory.text;
      slot.lastText = t;
      els.text.textContent = t;
      if(slot.seen.length >= (sc.maxTaps || 0)){
        slot.readyNext = true;
        app.state.exploreReadyNext = true;
        els.sub.textContent = '見られるのはあと 0 つ';
        els.spotHelp.textContent = 'タップで次へ進む';
        els.advance.classList.remove('hidden');
        Array.from(els.spotLayer.querySelectorAll('.spot')).forEach(n => {
          if(slot.seen.includes(n.textContent === spot.label ? spot.id : '')) {}
        });
        b.classList.add('used');
      } else {
        els.sub.textContent = `見られるのはあと ${Math.max((sc.maxTaps || 0) - slot.seen.length, 0)} つ`;
        render();
      }
    };
    els.spotLayer.appendChild(b);
  });
}
function advance(){
  const sc = currentScene();
  if(!sc) return;
  if(Date.now() < (app.state.noAdvanceUntil || 0)) return;
  if(sc.type === 'explore' && app.state.exploreReadyNext){
    nextScene();
    return;
  }
  if(sc.type !== 'talk') return;
  if(app.state.idx < (sc.lines || []).length - 1){
    app.state.idx++;
    render();
  } else {
    nextScene();
  }
}

function buildHypothesisEvidenceScene(chId, label, background, nextResult){

    }
  };

function hydrateState(saved){
  const base = defaultState();
  const state = Object.assign({}, base, saved || {});
  state.flags = Object.assign({}, base.flags, (saved && saved.flags) || {});
  state.clues = Object.assign({}, base.clues, (saved && saved.clues) || {});
  state.sceneData = Object.assign({}, base.sceneData, (saved && saved.sceneData) || {});
  state.hypotheses = Object.assign({}, base.hypotheses, (saved && saved.hypotheses) || {});
  state.hypothesisEvidence = Object.assign({}, base.hypothesisEvidence, (saved && saved.hypothesisEvidence) || {});
  state.hypothesisStrength = Object.assign({}, base.hypothesisStrength, (saved && saved.hypothesisStrength) || {});
  state.rebuttals = Object.assign({}, base.rebuttals, (saved && saved.rebuttals) || {});
  state.hypothesisBoards = Object.assign({}, base.hypothesisBoards, (saved && saved.hypothesisBoards) || {});
  state.rejectedClaims = Array.isArray(saved && saved.rejectedClaims) ? saved.rejectedClaims : [];
  state.proofLog = Array.isArray(saved && saved.proofLog) ? saved.proofLog : [];
  state.chainState = Array.isArray(saved && saved.chainState) ? saved.chainState : [];
  return state;
}

  ]},
  ch05_intervene:{type:'choice',label:'第五章 クリスマス前の短い寄り道',background:'winter',text:'ここで、どう動く。',options:[
    {text:'ミノリに、渡すなら今日の方がいいと言う',effects:{ACT_SPEAK:1, REL_MINORI:1, MYS_LOST:1},onPick:(g)=>g.state.ch05Choice='minori',next:'ch05_result'},
    {text:'トオルに、今の送らないのと聞く',effects:{ACT_SPEAK:1, REL_TORU:1, MYS_LOST:1},onPick:(g)=>g.state.ch05Choice='toru',next:'ch05_result'},
    {text:'自分から何かを渡す',effects:{ACT_RETURN:1},onPick:(g)=>g.state.ch05Choice='self',next:'ch05_result'},
    {text:'何も言わない',effects:{ACT_LOOK:1},onPick:(g)=>g.state.ch05Choice='none',next:'ch05_result'}
  ]},
  ch05_result:{type:'talk',label:'第五章 クリスマス前の短い寄り道',background:'winter',onEnter(game){
    applyRenBoardEvidenceOnce('ch05_base');
    if(game.state.ch05Choice==='toru') applyToruBoardEvidenceOnce('ch05_toru');
  },build(game){
    let t='誰も大げさには困らない。だからこそ、渡されなかったものと送られなかった言葉だけが、小さくきれいなまま残る。あとから思い返した時に一番消えないのは、こういう何でもない顔をした中断なのかもしれない。イルミネーションの話題や冬休み前の浮ついた空気の中で、止まった手だけが妙に静かだった。';
    if(game.state.flags.ACT_RETURN>=1) t='六角レンチ自身が何かを渡したことで、この章だけは眺めるだけの時間で終わらなかった。返すという行為は小さくても現実の重さを持つ。その感触が、第十章へ届く種になる。指先に残った紙の重みが、次に誰かへ踏み込む時の基準になる。';
    else if(game.state.flags.REL_TORU>=1) t='トオルに問いを向けたことで、送られなかった言葉は単なる未送信ではなく、完成を待ち続ける保留なのだとわかる。言葉を止める癖が、この章からはっきり見え始めた。返せないものは、物より先に文章の形をしていることもあるのだと知る。';
    else if(game.state.flags.REL_MINORI>=1) t='ミノリに声をかけたことで、渡せなかった包みはただの小道具ではなくなった。残った一つが、この先ずっと教室の空気に影を作る。冬休みが近づくほど、その影だけはきれいに片づかない。';
    t += '\n\nレンは、ああいうのは一人の空気だろと言う。トオルは、止まった手が一つではなかった気がするとだけ言う。ナナオは、包みの折り目が一度開かれてまた戻されていると事実だけを置く。';
    return {lines:[{speaker:'',text:t}],next:'ch05_hypothesis'};
  }},

  ch06_intro:{type:'talk',label:'第六章 小さな初詣',background:'shrine',lines:[
    {speaker:'',text:'年が明けても、去年からの違和感はちゃんとついてきた。一月の神社は静かなのに、願いだけがやけに多い。制服の上から着たコートの袖が冷たくなる。書きかけで消された絵馬がある。ミノリが買ったお守りは、自分のためではなく誰かへ渡る向きをしている。去年の絵馬の写真には、今年と同じような残り方をした文字がある。ここで初めて、今起きていることが今年だけの出来事ではないとわかる。賽銭箱の前で鳴る鈴の音が遠く感じるぶん、残った文字だけが妙に近い。'},
    {speaker:'トオル',text:'去年も、ここに来た'},

  ch06_explore:{type:'explore',label:'第六章 小さな初詣',background:'shrine',intro:'部活帰りの冷えた手のまま、二つだけ確かめる。',maxTaps:2,next:'ch06_intervene',help:'見られるのは二つまで。誰かが掃除当番を始める前に。',spots:[

    {id:'amulet',label:'お守り棚',x:70,y:36,w:18,h:8,text:'同じ種類のお守りが一つだけ売り切れている。',contextText:{after_ema:'書けなかった願いと、誰かのために選ばれたお守りが同じ線へ並ぶ。渡せなかったものは、言葉だけではない。'},effects:{ACT_LOOK:1, MYS_LOST:1}}

  ch06_intervene:{type:'choice',label:'第六章 小さな初詣',background:'shrine',build(game){

  ch06_result:{type:'talk',label:'第六章 小さな初詣',background:'shrine',onEnter(game){
    const seen = game.state.sceneData.ch06_explore?.seen || [];

    if(seen.includes('amulet')) applyMinoriBoardEvidenceOnce('ch06_amulet');
  },build(game){

    t += '\n\nレンは偶然だと言い、ミノリはそれなら気味が悪いと笑う。トオルは去年も来たとだけ答え、ナナオは同じ文字が続くなら偶然では片づけにくいと事実だけを見る。';
    return {lines:[{speaker:'',text:t}],next:'ch06_hypothesis'};

  ch07_intro:{type:'talk',label:'第七章 バレンタイン周辺',background:'valentine',lines:[

  ],next:'ch07_explore'},

    {id:'door',label:'ドア近く',x:80,y:74,w:14,h:8,text:'渡しかけてやめた子が立っていた場所。何も残っていないのに、足だけ止まった感じがある。',contextText:{after_gift:'包みを見たあとだと、この場所は単なる立ち位置ではなく、渡せなかった直後の空白として見えてくる。'},effects:{ACT_LOOK:1}}

  ch07_intervene:{type:'choice',label:'第七章 バレンタイン周辺',background:'valentine',text:'ここで、どう動く。',options:[

  ch01_hypothesis: buildHypothesisScene('ch01','第一章 仮説','classroom','この時点で、17番の不在をどう解釈する。','ch01_hypothesis_result'),

  ch01_hypothesis_result:{type:'talk',label:'第一章 仮説の手触り',background:'classroom',build(game){

    if(id==='conceal') t='隠蔽だと考えると、誰が何を守ろうとしたのかが気になり始める。犯人探しの方向へ寄るぶん、感情の形はまだ見えにくい。';

    else t += '\n\n根拠がずれている。考えた痕跡は残るが、この推理はどこか空回りしている。';

  }},

      {speaker:'',text:'一つ、あるいは二つの棚が空いた。そのぶんだけ、隣に残ったものの輪郭が濃くなる。軽くなったはずの空気の中で、まだ動かない時間だけが、かえってよく見えた。返せたものの数より、まだ返せないものの沈黙の方が、この夜は耳に残る。'},
      {speaker:'',text:'放課後の教室に戻ると、机の位置も、カーテンの揺れも、昨日までと何も変わらない。なのに、返せたものがあるという事実だけが、小さく現実の重さを持っている。消しゴムのかすやプリントの端までいつも通りなのに、そこへ混ざる自分の呼吸だけ少し違う。'},
      {speaker:'',text:'全部ではない。それでもゼロではない。この部屋はまだ次の名前を待っているけれど、もうただ飲み込むだけの場所ではなくなっていた。'}
    ], next:'final_log'};
  }},
  ending_true:{type:'talk',label:'到達エンド',background:'ending',build(game){
    game.state.finalEnding = 'true';
    return {lines:[
      {speaker:'',text:'三つの保留が、ようやく動いた。宛名のない紙も、喉元で止まった一音も、送られなかった空白も、もう標本の形では残っていない。誰かの未返却ではなく、誰かが返したあとの静けさへ変わっている。いちばん大きく変わったのは部屋ではなく、そこへ立つ六角レンチたちの目つきの方かもしれない。'},
      {speaker:'',text:'棚には、薄い日焼け跡だけが残った。長くそこにあったものほど、なくなったあともしばらく輪郭を離さない。教室へ戻っても、その跡だけはしばらく胸の内側に残る。卒業アルバムの白い余白みたいに、もう埋まらないのに、そこにあったことだけははっきりしている。'},
      {speaker:'',text:'17番の先にある部屋。ここは何かを隠しておくための場所ではなくなった。通り過ぎたものの重みだけを残して、前へ出していく場所になった。秘密を抱える部屋ではなく、秘密が終わったあとにだけ静かになる部屋へ変わった。'},
      {speaker:'',text:'六角レンチは、鍵を閉める前に一度だけ振り返る。もう誰かのための祠ではない。ここは、返せなかったものが返るまで待っていた部屋だった。'}
    ], next:'final_log'};
  }},
  final_log:{type:'talk',label:'最終記録',background:'ending',build(game){
    const txt = `観測を終える。

最初は、ただ鍵を探していただけだった。
17番だけがない。その感じの悪い欠け方を追っていくうちに、鍵箱の裏紙、放送にまぎれた一文、去年から残った絵馬、宛名のない包み、送れなかったメッセージが、ぜんぶ同じ部屋を指し始めた。授業中に窓の外を見ている時も、帰り道でイヤホンを片方だけ外した時も、その部屋のことだけは妙にはっきり残っていた。

彼らが守っていたのは、思い出ではなかった。
変わってしまったあとを引き受けること、その怖さだった。
定義を避け、対話を切り、保存に逃げる。
形は違っていても、どれも同じ保留だった。高校生の時間は短いくせに、その短さの中で決まってしまうことだけは妙に重い。だからみんな、少しずつ違う形で立ち止まっていた。

ここに残した記録は、もう答え合わせのためには使えない。
真実が定まった瞬間、それは謎ではなく、ただ誰かが確かに通った跡になる。
手帳を閉じる。
残るのは、整理された記録ではなく、もう見過ごせない感触だけだ。明日から同じ教室に座っても、もう前と同じ顔ではいられない。その程度には、この部屋は現実へ触ってきた。`;
    game.state.finalLogText = txt;
    return {lines:[{speaker:'', text:txt}], next:'final_question'};
  }},
  final_question:{type:'talk',label:'最後の一行',background:'ending',lines:[
    {speaker:'',text:'まだ手元に置いたままのものは、ありますか。\n\n返す相手がいるものでも、いないものでも。'}
  ],next:'title_return'},
  title_return:{type:'talk',label:'完了',background:'ending',lines:[{speaker:'',text:'タイトルへ戻る。'}],next:null}
};

  scenes.ch07_evidence = buildHypothesisEvidenceScene('ch07','第七章 根拠の提示','valentine','ch07_result_logic');
